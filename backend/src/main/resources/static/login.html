<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LeaveEase</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e1e5e9;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            border-left: 4px solid #c33;
        }

        .success-message {
            background: #efe;
            color: #363;
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            border-left: 4px solid #363;
        }

        .demo-credentials {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 5px;
            margin-top: 1.5rem;
            border-left: 4px solid #17a2b8;
        }

        .demo-credentials h4 {
            color: #17a2b8;
            margin-bottom: 0.5rem;
        }

        .demo-credentials p {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0.25rem;
        }

        .demo-credentials strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🏢 LeaveEase</h1>
            <p>Sign in to access your dashboard</p>
        </div>

        <!-- Error message -->
        <div id="errorMessage" class="error-message" style="display: none;">
            Invalid username or password. Please try again.
        </div>

        <!-- Success message -->
        <div id="successMessage" class="success-message" style="display: none;">
            You have been logged out successfully.
        </div>

        <form id="loginForm" onsubmit="handleLoginSubmit(event); return false;">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <!-- Demo credentials -->
        <div class="demo-credentials">
            <h4>🎯 Demo Credentials</h4>
            <p><strong>HR User:</strong> hr_user / password123</p>
            <p><strong>Employee:</strong> john_doe / password123</p>
            <p><strong>Employee:</strong> jane_smith / password123</p>
        </div>
    <!-- Replace the line you added with this better version -->
<div class="signup-link" style="text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #e1e5e9;">
    <p style="color: #666; font-size: 0.9rem; margin: 0;">Don't have an account? <a href="/signup.html" style="color: #667eea; text-decoration: none; font-weight: 500;">Sign up here</a></p>
</div>


    <script>
        console.log('Login script loaded');
        
        // Handle login submission
        async function handleLoginSubmit(event) {
            console.log('Login form submitted');
            if (event) event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            
            console.log('Login attempt for user:', username);
            
            if (!username || !password) {
                errorMsg.textContent = 'Please enter both username and password.';
                errorMsg.style.display = 'block';
                console.warn('Missing username or password');
                return false;
            }
            
            try {
                errorMsg.style.display = 'none'; // Hide previous errors
                console.log('Sending login request to /api/auth/login');
                const loginData = { username, password };
                console.log('Request payload:', JSON.stringify(loginData));
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(loginData)
                });
                
                console.log('Response status:', response.status, response.statusText);
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok && data.token) {
                    console.log('Login successful!');
                    // Store token
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    
                    // Redirect to dashboard
                    const redirectUrl = data.role === 'HR' ? '/dashboard.html?role=hr' : '/dashboard.html?role=employee';
                    console.log('Redirecting to:', redirectUrl);
                    window.location.href = redirectUrl;
                } else {
                    console.log('Login failed with status:', response.status);
                    errorMsg.textContent = data.error || 'Invalid username or password. Please try again.';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error caught:', error);
                errorMsg.textContent = 'Connection error: ' + (error.message || 'Unknown error');
                errorMsg.style.display = 'block';
            }
            return false;
        }
        
        // Check for error parameter in URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'true') {
            document.getElementById('errorMessage').style.display = 'block';
            console.log('Error parameter found in URL');
        }
        
        // Check for logout parameter in URL
        if (urlParams.get('logout') === 'true') {
            document.getElementById('successMessage').style.display = 'block';
            console.log('Logout parameter found in URL');
        }

        // Ensure form submission handler is set up
        window.addEventListener('DOMContentLoaded', function() {
            console.log('Window DOMContentLoaded event fired');
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', handleLoginSubmit);
                console.log('Form submit listener attached');
            }
        });

        // Auto-fill demo credentials when clicked
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Document DOMContentLoaded event fired');
            const demoCredentials = document.querySelector('.demo-credentials');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');

            if (demoCredentials) {
                demoCredentials.addEventListener('click', function(e) {
                    if (e.target.textContent.includes('hr_user')) {
                        usernameInput.value = 'hr_user';
                        passwordInput.value = 'password123';
                        console.log('Auto-filled HR user: hr_user / password123');
                    } else if (e.target.textContent.includes('john_doe')) {
                        usernameInput.value = 'john_doe';
                        passwordInput.value = 'password123';
                        console.log('Auto-filled Employee: john_doe / password123');
                    } else if (e.target.textContent.includes('jane_smith')) {
                        usernameInput.value = 'jane_smith';
                        passwordInput.value = 'password123';
                        console.log('Auto-filled Employee: jane_smith / password123');
                    }
                });
            }
        });
        
        // Make handleLoginSubmit available globally
        window.handleLoginSubmit = handleLoginSubmit;
    </script>
</body>
</html>
